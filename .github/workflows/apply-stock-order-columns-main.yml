name: Apply stock order columns on main

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-stock-order-columns-main.yml

permissions:
  contents: write

jobs:
  apply-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply requested columns
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/pages/StockCountPage.tsx')
          text = path.read_text(encoding='utf-8')

          old_grid = 'return "grid-cols-[minmax(0,1fr)_38px_38px_42px_38px_96px]";'
          new_grid = 'return "grid-cols-[minmax(0,1fr)_38px_38px_38px_42px_38px_96px]";'
          if text.count(old_grid) != 1:
              raise SystemExit('Pedido grid pattern not found exactly once')
          text = text.replace(old_grid, new_grid, 1)

          header_pattern = re.compile(r'''(\{viewMode === 'pedido' && \(\n\s*<>\n)\s*<div className="px-1\.5 border-r border-neutral-200 flex items-center h-8">Produto</div>\n\s*<div className="p-0\.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ult\.<br/>Ped\.</div>\n\s*<div className="p-0\.5 border-r border-neutral-200 text-center flex items-center justify-center h-8">Qtd</div>\n\s*<div className="p-0\.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ult\.<br/>Cont\.</div>\n\s*<div className="p-0\.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ideal</div>\n\s*<div className="p-0\.5 text-center flex items-center justify-center h-8">Pedido</div>''')
          header_replacement = r'''\1                    <div className="px-1.5 border-r border-neutral-200 flex items-center h-8">Produto</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none" title="Última contagem salva">Ult.<br/>Cont.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none" title="Dias desde o último pedido">Ult.<br/>Ped.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8" title="Quantidade do último pedido">Qtd</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none" title="Estoque atual contado">Est.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ideal</div>
                    <div className="p-0.5 text-center flex items-center justify-center h-8">Pedido</div>'''
          text, header_count = header_pattern.subn(header_replacement, text, count=1)
          if header_count != 1:
              raise SystemExit(f'Pedido header pattern matches: {header_count}')

          marker = "                    {viewMode === 'pedido' && ("
          start = text.index(marker)
          end = text.index("                    )}", start)
          block = text[start:end]
          product_end = block.index('                        <div className={cn(', block.index('{item.produto_nome}'))
          controls_start = block.index('                        <div className="p-0.5 flex items-center justify-center gap-0.5 min-h-10"')
          prefix = block[:product_end]
          suffix = block[controls_start:]

          columns = '''                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70" title="Última contagem salva">
                          {item.ultima_contagem_valor}
                        </div>
                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          item.dias_ult_compra > 180 
                            ? "text-red-600 font-black bg-red-50/50" 
                            : isLastOrder
                              ? "font-semibold text-neutral-950"
                              : "text-neutral-400 font-normal opacity-70"
                        )} title="Dias desde o último pedido">
                          {item.dias_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70" title="Quantidade do último pedido">
                          {item.qtd_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] font-black text-orange-700 bg-orange-50/40" title="Estoque atual contado">
                          {estoqueMap[item.produto_id] ?? 0}
                        </div>
                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          isBelowIdeal ? "text-red-600 font-black bg-red-50/30" : "font-bold"
                        )}>
                          {item.estoque_ideal}
                        </div>
'''
          text = text[:start] + prefix + columns + suffix + text[end:]
          path.write_text(text, encoding='utf-8')
          PY

          rm -f .github/workflows/apply-stock-order-columns.yml
          rm -f .github/workflows/apply-stock-order-columns-pr.yml
          rm -f .github/workflows/apply-stock-order-columns-main.yml

      - name: Commit final change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/StockCountPage.tsx .github/workflows
          git commit -m "Exibe estoque atual na montagem do pedido"
          git push origin HEAD:main
