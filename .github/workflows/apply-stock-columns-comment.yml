name: Apply stock columns by comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  apply:
    if: github.event.issue.number == 2 && contains(github.event.comment.body, '/apply-stock-columns')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply requested stock order columns
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/pages/StockCountPage.tsx')
          text = path.read_text(encoding='utf-8')

          old_grid = 'return "grid-cols-[minmax(0,1fr)_38px_38px_42px_38px_96px]";'
          new_grid = 'return "grid-cols-[minmax(0,1fr)_42px_38px_38px_42px_38px_96px]";'
          if old_grid not in text:
              raise SystemExit('Pedido grid pattern not found')
          text = text.replace(old_grid, new_grid, 1)

          old_header = '''                    <div className="px-1.5 border-r border-neutral-200 flex items-center h-8">Produto</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ult.<br/>Ped.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8">Qtd</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ult.<br/>Cont.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ideal</div>
                    <div className="p-0.5 text-center flex items-center justify-center h-8">Pedido</div>'''
          new_header = '''                    <div className="px-1.5 border-r border-neutral-200 flex items-center h-8">Produto</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ult.<br/>Cont.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ult.<br/>Ped.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8">Qtd</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Est.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ideal</div>
                    <div className="p-0.5 text-center flex items-center justify-center h-8">Pedido</div>'''
          if old_header not in text:
              raise SystemExit('Pedido header pattern not found')
          text = text.replace(old_header, new_header, 1)

          old_rows = '''                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          item.dias_ult_compra > 180 
                            ? "text-red-600 font-black bg-red-50/50" 
                            : isLastOrder
                              ? "font-semibold text-neutral-950"
                              : "text-neutral-400 font-normal opacity-70"
                        )}>
                          {item.dias_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70">
                          {item.qtd_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70">
                          {item.ultima_contagem_valor}
                        </div>
                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          isBelowIdeal ? "text-red-600 font-black bg-red-50/30" : "font-bold"
                        )}>
                          {item.estoque_ideal}
                        </div>'''
          new_rows = '''                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70">
                          {item.ultima_contagem_valor}
                        </div>
                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          item.dias_ult_compra > 180 
                            ? "text-red-600 font-black bg-red-50/50" 
                            : isLastOrder
                              ? "font-semibold text-neutral-950"
                              : "text-neutral-400 font-normal opacity-70"
                        )}>
                          {item.dias_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70">
                          {item.qtd_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] font-bold text-orange-700 bg-orange-50/40">
                          {estoqueMap[item.produto_id] ?? 0}
                        </div>
                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          isBelowIdeal ? "text-red-600 font-black bg-red-50/30" : "font-bold"
                        )}>
                          {item.estoque_ideal}
                        </div>'''

          # Replace only the pedido occurrence: the same row pattern appears once in each mode.
          first = text.find(old_rows)
          if first == -1:
              raise SystemExit('Row pattern not found')
          second = text.find(old_rows, first + len(old_rows))
          if second == -1:
              raise SystemExit('Pedido row pattern not found')
          text = text[:second] + text[second:].replace(old_rows, new_rows, 1)

          path.write_text(text, encoding='utf-8')
          PY

          rm -f .github/workflows/apply-stock-columns-comment.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/StockCountPage.tsx .github/workflows/apply-stock-columns-comment.yml
          git commit -m "Exibir estoque atual no modo pedido"
          git push origin main
