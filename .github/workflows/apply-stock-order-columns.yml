name: Apply stock order columns

on:
  push:
    branches:
      - agent/estoque-atual-no-pedido
    paths:
      - .github/workflows/apply-stock-order-columns.yml

permissions:
  contents: write

jobs:
  apply-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/estoque-atual-no-pedido
          fetch-depth: 0

      - name: Update stock order columns
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/pages/StockCountPage.tsx')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  'return "grid-cols-[minmax(0,1fr)_38px_38px_42px_38px_96px]";',
                  'return "grid-cols-[minmax(0,1fr)_38px_38px_38px_42px_38px_96px]";'
              ),
              (
                  '''                    <div className="px-1.5 border-r border-neutral-200 flex items-center h-8">Produto</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ult.<br/>Ped.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8">Qtd</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ult.<br/>Cont.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ideal</div>
                    <div className="p-0.5 text-center flex items-center justify-center h-8">Pedido</div>''',
                  '''                    <div className="px-1.5 border-r border-neutral-200 flex items-center h-8">Produto</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none" title="Última contagem salva">Ult.<br/>Cont.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none" title="Dias desde o último pedido">Ult.<br/>Ped.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8" title="Quantidade do último pedido">Qtd</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none" title="Estoque atual contado">Est.</div>
                    <div className="p-0.5 border-r border-neutral-200 text-center flex items-center justify-center h-8 leading-none">Ideal</div>
                    <div className="p-0.5 text-center flex items-center justify-center h-8">Pedido</div>'''
              ),
              (
                  '''                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          item.dias_ult_compra > 180 
                            ? "text-red-600 font-black bg-red-50/50" 
                            : isLastOrder
                              ? "font-semibold text-neutral-950"
                              : "text-neutral-400 font-normal opacity-70"
                        )}>
                          {item.dias_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70">
                          {item.qtd_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70">
                          {item.ultima_contagem_valor}
                        </div>
                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          isBelowIdeal ? "text-red-600 font-black bg-red-50/30" : "font-bold"
                        )}>
                          {item.estoque_ideal}
                        </div>''',
                  '''                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70" title="Última contagem salva">
                          {item.ultima_contagem_valor}
                        </div>
                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          item.dias_ult_compra > 180 
                            ? "text-red-600 font-black bg-red-50/50" 
                            : isLastOrder
                              ? "font-semibold text-neutral-950"
                              : "text-neutral-400 font-normal opacity-70"
                        )} title="Dias desde o último pedido">
                          {item.dias_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] opacity-70" title="Quantidade do último pedido">
                          {item.qtd_ult_compra}
                        </div>
                        <div className="p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px] font-black text-orange-700 bg-orange-50/40" title="Estoque atual contado">
                          {estoqueMap[item.produto_id] ?? 0}
                        </div>
                        <div className={cn(
                          "p-0.5 border-r border-neutral-100 text-center flex items-center justify-center min-h-10 text-[11px] md:text-[12px]",
                          isBelowIdeal ? "text-red-600 font-black bg-red-50/30" : "font-bold"
                        )}>
                          {item.estoque_ideal}
                        </div>'''
              )
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one match, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

          rm .github/workflows/apply-stock-order-columns.yml

      - name: Commit applied change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/StockCountPage.tsx .github/workflows/apply-stock-order-columns.yml
          git commit -m "Exibe estoque atual na montagem do pedido"
          git push origin HEAD:agent/estoque-atual-no-pedido
