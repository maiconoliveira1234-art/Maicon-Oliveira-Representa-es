  <!-- Entrada da Casinha (Arco) -->
  <path d="M256 200 C180 200 160 300 160 440 H352 C352 300 332 200 256 200Z" fill="#0f2b1d"/>
  
  <!-- Cachorro (Simplificado e Amigável) -->
  <!-- Rosto -->
  <circle cx="256" cy="350" r="70" fill="#f5e6d3"/>
  <!-- Orelhas -->
  <path d="M186 320 Q160 280 160 360 Q160 400 190 380 Z" fill="#f5e6d3"/>
  <path d="M326 320 Q352 280 352 360 Q352 400 322 380 Z" fill="#f5e6d3"/>
  
