  <text x="228" y="365" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#0f2b1d" text-anchor="middle">$</text>
  <text x="284" y="365" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#0f2b1d" text-anchor="middle">$</text>
  
  <!-- Focinho -->
  <path d="M256 375 Q256 395 240 395 Q256 395 272 395 Q256 395 256 375Z" fill="#0f2b1d"/>
  <circle cx="256" cy="385" r="12" fill="#0f2b1d"/>
  
